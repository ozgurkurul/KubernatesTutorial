apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-deployment
  labels:
    app: dinamik-react
spec:
  replicas: 2 # Bu sefer 2 kopya (Pod) çalıştıralım
  selector:
    matchLabels:
      app: dinamik-react
  template:
    metadata:
      labels:
        app: dinamik-react
    spec:
      containers:
      - name: react-container
        image: benim-react-imajim:v1
        imagePullPolicy: Never # İnternetten arama, yereldeki imajı kullan dedik
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: react-servisi
spec:
  type: NodePort
  selector:
    app: dinamik-react
  ports:
    - port: 80
      targetPort: 80
      nodePort: 31005 # Bu sefer 31005 portundan dışarı açıyoruz