apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotnet-api-deployment
  labels:
    app: backend-api
spec:
  replicas: 2 # 2 tane .NET API kopyasi calissin
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      containers:
      - name: dotnet-container
        image: benim-dotnet-api:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: dotnet-api-servisi
spec:
  type: NodePort
  selector:
    app: backend-api
  ports:
    - port: 80
      targetPort: 80
      nodePort: 31010 # Bu sefer 31010 portunu sectik